name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Build matrix — 7 targets matching CLIProxyAPI's own release coverage
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.variant && '-' || '' }}${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 v3 (AVX2+ — CPA's preferred scan path)
          - goos: linux
            goarch: amd64
            goamd64: v3
            runner: ubuntu-latest
            variant: v3
            artifact: respfilter.so
          # Linux amd64 baseline
          - goos: linux
            goarch: amd64
            goamd64: v1
            runner: ubuntu-latest
            variant: ""
            artifact: respfilter.so
          # Linux arm64 — native ARM runner
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            variant: ""
            artifact: respfilter.so
          # macOS Apple Silicon
          - goos: darwin
            goarch: arm64
            runner: macos-15
            variant: ""
            artifact: respfilter.so
          # macOS Intel
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            variant: ""
            artifact: respfilter.so
          # Windows amd64
          - goos: windows
            goarch: amd64
            runner: windows-latest
            variant: ""
            artifact: respfilter.dll
          # Windows arm64
          - goos: windows
            goarch: arm64
            runner: windows-11-arm
            variant: ""
            artifact: respfilter.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ── C compiler ────────────────────────────────────────────────────
      # ubuntu-latest / ubuntu-24.04-arm: gcc pre-installed
      # macOS: clang pre-installed via Xcode CLT
      # windows amd64: MSYS2 mingw-w64 gcc at C:\msys64\mingw64\bin
      # windows arm64: MSYS2 gcc is x86_64 cross-compiler (can't assemble arm64),
      #   so use LLVM clang instead (native arm64 support)
      - name: Setup C compiler (Windows amd64)
        if: runner.os == 'Windows' && matrix.goarch == 'amd64'
        shell: pwsh
        run: |
          $candidates = @("C:\msys64\mingw64\bin", "C:\msys64\ucrt64\bin", "C:\Program Files\mingw64\bin")
          foreach ($p in $candidates) {
            $gcc = Join-Path $p "gcc.exe"
            if (Test-Path $gcc) {
              Write-Host "Found gcc at: $gcc"
              echo "$p" >> $env:GITHUB_PATH
              & $gcc --version
              return
            }
          }
          Write-Host "gcc not found, installing via choco..."
          choco install -y mingw --no-progress
          $gccPath = (Get-ChildItem -Path "C:\Program Files\mingw64\bin","C:\msys64\mingw64\bin" -Filter "gcc.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          if ($gccPath) { echo "$gccPath" >> $env:GITHUB_PATH }

      - name: Setup C compiler (Windows arm64)
        if: runner.os == 'Windows' && matrix.goarch == 'arm64'
        shell: pwsh
        run: |
          # On windows-11-arm, MSYS2's gcc targets x86_64 (emulated), not arm64.
          # Use LLVM clang instead, which natively targets arm64 Windows.
          $candidates = @(
            "C:\msys64\clang64\bin",
            "C:\Program Files\LLVM\bin",
            "C:\Program Files (x86)\LLVM\bin"
          )
          foreach ($p in $candidates) {
            $clang = Join-Path $p "clang.exe"
            if (Test-Path $clang) {
              Write-Host "Found clang at: $clang"
              echo "$p" >> $env:GITHUB_PATH
              & $clang --version
              return
            }
          }
          # Fallback: check if MSYS2 has clang64 package
          Write-Host "clang not found in standard paths, trying MSYS2 pacman..."
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-clang-aarch64-clang 2>$null
          if (Test-Path "C:\msys64\clang64\bin\clang.exe") {
            echo "C:\msys64\clang64\bin" >> $env:GITHUB_PATH
            & "C:\msys64\clang64\bin\clang.exe" --version
          }

      - name: Verify C compiler and Go
        shell: bash
        run: |
          echo "=== C compiler ==="
          which gcc && gcc --version || which cc && cc --version
          echo "=== Go ==="
          go version

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build plugin
        shell: bash
        run: |
          set -e

          # Set CC based on platform
          if [ "$RUNNER_OS" = "Windows" ]; then
            if [ "${{ matrix.goarch }}" = "arm64" ]; then
              export CC="clang"
            else
              export CC="gcc"
            fi
          elif [ "$RUNNER_OS" = "macOS" ]; then
            export CC="clang"
          else
            export CC="gcc"
          fi

          # Determine output filename
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="respfilter.dll"
          else
            OUTPUT="respfilter.so"
          fi

          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }} (GOAMD64=${{ matrix.goamd64 }})..."
          CGO_ENABLED=1 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          GOAMD64=${{ matrix.goamd64 }} \
          go build -buildmode=c-shared -ldflags="-s -w" -o "$OUTPUT" .

          # Remove the generated C header (not needed at runtime)
          rm -f respfilter.h

          # Verify the output
          ls -la "$OUTPUT"
          echo "✓ Build successful: $OUTPUT"

      # ── Stage into plugin directory structure ─────────────────────────
      - name: Stage plugin files
        shell: bash
        run: |
          set -e

          # Determine the plugin subdirectory for this target
          if [ "${{ matrix.goos }}" = "linux" ]; then
            if [ -n "${{ matrix.variant }}" ]; then
              PLUG_DIR="plugins/linux/${{ matrix.goarch }}-${{ matrix.variant }}"
            else
              PLUG_DIR="plugins/linux/${{ matrix.goarch }}"
            fi
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            PLUG_DIR="plugins/darwin/${{ matrix.goarch }}"
          else
            PLUG_DIR="plugins/windows/${{ matrix.goarch }}"
          fi

          mkdir -p "staging/$PLUG_DIR"
          cp "${{ matrix.artifact }}" "staging/$PLUG_DIR/"
          cp config.snippet.yaml "staging/"

          # Set permissions (dlopen needs read+execute)
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod 755 "staging/$PLUG_DIR/${{ matrix.artifact }}"
          fi

          echo "Staged to: $PLUG_DIR"
          find staging -type f | sort

      # ── Archive ───────────────────────────────────────────────────────
      - name: Create archive
        id: archive
        shell: bash
        run: |
          set -e

          # Determine archive name
          if [ -n "${{ matrix.variant }}" ]; then
            ARCHIVE_NAME="respfilter_${{ matrix.goos }}_${{ matrix.goarch }}-${{ matrix.variant }}"
          else
            ARCHIVE_NAME="respfilter_${{ matrix.goos }}_${{ matrix.goarch }}"
          fi

          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE_FILE="${ARCHIVE_NAME}.zip"
            (cd staging && 7z a -tzip "../${ARCHIVE_FILE}" .)
          else
            ARCHIVE_FILE="${ARCHIVE_NAME}.tar.gz"
            tar czf "${ARCHIVE_FILE}" -C staging .
          fi

          echo "archive_file=${ARCHIVE_FILE}" >> $GITHUB_OUTPUT
          ls -la "${ARCHIVE_FILE}"
          echo "✓ Archive created: ${ARCHIVE_FILE}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: respfilter-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.variant && '-' || '' }}${{ matrix.variant }}
          path: ${{ steps.archive.outputs.archive_file }}
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Release — collect all artifacts and publish to GitHub Releases
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: |
          echo "=== All release artifacts ==="
          find artifacts -type f | sort
          echo ""
          echo "=== File sizes ==="
          ls -lh artifacts/*

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt || true
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            # CPA RespFilter ${{ steps.tag.outputs.tag }}

            [English](#english) | [中文](#中文)

            ---

            ## English

            A [CLIProxyAPI](https://github.com/router-for-me/CLIProxyAPI) plugin that detects and filters OpenAI reasoning degradation — the **"516 problem"**. When degradation occurs, the response always reports a fixed `reasoning_tokens` value (516) regardless of the requested reasoning effort. This plugin detects that signature and takes configurable action.

            ### Quick Install

            **1. Download** the archive matching your platform (see table below)

            **2. Extract** into your CLIProxyAPI installation directory:

            ```bash
            # Linux / macOS
            tar xzf respfilter_linux_amd64-v3.tar.gz -C /opt/cliproxyapi/

            # Windows — unzip and copy the plugins/ folder into your CPA directory
            ```

            The archive already contains the correct directory structure:
            ```
            plugins/linux/amd64-v3/respfilter.so   # the plugin
            config.snippet.yaml                    # config example
            ```

            **3. Configure** — add this to your `config.yaml`:

            ```yaml
            plugins:
              enabled: true
              configs:
                respfilter:
                  enabled: true
                  priority: 1
            ```

            That's it — the default config detects `reasoning_tokens == 516` and returns an error so your client retries. For advanced rules (custom paths, retry mode, model filtering), see `config.snippet.yaml` in the archive or the [full documentation](https://github.com/duncatzat/cpa-resp516-filter#configuration).

            **4. Restart** CLIProxyAPI and verify:

            ```bash
            # Check logs
            journalctl -u cliproxyapi | grep pluginhost
            # Expected: pluginhost: plugin loaded  plugin_id=respfilter ...

            # Check status via Management API
            curl http://localhost:8317/v0/resource/plugins/respfilter/status
            ```

            ### Docker / Docker Compose

            If you run CPA via Docker, mount the plugin as a volume — no image rebuild needed.

            **1.** Download a **Linux** archive (even if your host is macOS/Windows, the container runs Linux):
            ```bash
            mkdir -p ./plugins
            wget https://github.com/duncatzat/cpa-resp516-filter/releases/latest/download/respfilter_linux_amd64-v3.tar.gz
            tar xzf respfilter_linux_amd64-v3.tar.gz -C ./plugins --strip-components=1
            ```

            **2.** Add the plugins volume to your `docker-compose.yml`:
            ```yaml
            services:
              cli-proxy-api:
                image: eceasy/cli-proxy-api:latest
                ports:
                  - "8317:8317"
                volumes:
                  - ./config.yaml:/CLIProxyAPI/config.yaml
                  - ./auths:/root/.cli-proxy-api
                  - ./logs:/CLIProxyAPI/logs
                  - ./plugins:/CLIProxyAPI/plugins    # ← ADD THIS
                restart: unless-stopped
            ```

            **3.** Enable in `config.yaml` (same as above) → **4.** `docker compose up -d`

            > Apple Silicon / ARM servers: download `respfilter_linux_arm64.tar.gz` instead.

            ### Platform Download Guide

            | File | Platform | How to choose |
            |------|----------|---------------|
            | `respfilter_linux_amd64-v3.tar.gz` | Linux x86_64 (AVX2+) | Most servers since ~2015. **Recommended.** |
            | `respfilter_linux_amd64.tar.gz` | Linux x86_64 (baseline) | Older CPUs or VMs without AVX2 |
            | `respfilter_linux_arm64.tar.gz` | Linux ARM64 | Raspberry Pi 4/5, AWS Graviton, ARM servers |
            | `respfilter_darwin_arm64.tar.gz` | macOS Apple Silicon | M1/M2/M3/M4 Macs |
            | `respfilter_darwin_amd64.tar.gz` | macOS Intel | Pre-2020 Intel Macs |
            | `respfilter_windows_amd64.zip` | Windows x86_64 | Most Windows PCs/servers |
            | `respfilter_windows_arm64.zip` | Windows ARM64 | Snapdragon X, Surface Pro X |

            > **Not sure which Linux?** Download `amd64-v3`. CPA automatically falls back to `amd64` if your CPU doesn't support AVX2.

            ### Verify Download

            ```bash
            sha256sum -c checksums.txt                    # verify checksum
            nm -D respfilter.so \| grep cliproxy          # verify symbols (Linux/macOS)
            # Expected: cliproxyPluginCall, cliproxyPluginFree, cliproxyPluginShutdown, cliproxy_plugin_init
            ```

            ### Documentation

            Full documentation: [README.md](https://github.com/duncatzat/cpa-resp516-filter/blob/main/README.md) (English) · [README_CN.md](https://github.com/duncatzat/cpa-resp516-filter/blob/main/README_CN.md) (中文)

            ---

            ## 中文

            一个 [CLIProxyAPI](https://github.com/router-for-me/CLIProxyAPI) 插件，检测并过滤 OpenAI 推理降智问题——**"516 问题"**。当降智发生时，响应始终报告固定的 `reasoning_tokens` 值（516），与请求的推理强度无关。本插件检测该特征并执行可配置的操作。

            ### 快速安装

            **1. 下载** 对应平台的压缩包（见下方表格）

            **2. 解压** 到 CLIProxyAPI 安装目录：

            ```bash
            # Linux / macOS
            tar xzf respfilter_linux_amd64-v3.tar.gz -C /opt/cliproxyapi/

            # Windows — 解压后将 plugins/ 文件夹复制到 CPA 目录
            ```

            压缩包已包含正确的目录结构：
            ```
            plugins/linux/amd64-v3/respfilter.so   # 插件文件
            config.snippet.yaml                    # 配置示例
            ```

            **3. 配置** — 在 `config.yaml` 中添加：

            ```yaml
            plugins:
              enabled: true
              configs:
                respfilter:
                  enabled: true
                  priority: 1
            ```

            这样就可以了——默认配置检测 `reasoning_tokens == 516` 并返回错误让客户端重试。如需高级规则（自定义路径、重试模式、模型过滤），参见压缩包中的 `config.snippet.yaml` 或[完整文档](https://github.com/duncatzat/cpa-resp516-filter#配置)。

            **4. 重启** CLIProxyAPI 并验证：

            ```bash
            # 检查日志
            journalctl -u cliproxyapi | grep pluginhost
            # 预期：pluginhost: plugin loaded  plugin_id=respfilter ...

            # 通过 Management API 检查状态
            curl http://localhost:8317/v0/resource/plugins/respfilter/status
            ```

            ### Docker / Docker Compose

            如果你通过 Docker 运行 CPA，将插件挂载为 volume 即可——无需重新构建镜像。

            **1.** 下载 **Linux** 版本（即使宿主机是 macOS/Windows，容器也运行 Linux）：
            ```bash
            mkdir -p ./plugins
            wget https://github.com/duncatzat/cpa-resp516-filter/releases/latest/download/respfilter_linux_amd64-v3.tar.gz
            tar xzf respfilter_linux_amd64-v3.tar.gz -C ./plugins --strip-components=1
            ```

            **2.** 在 `docker-compose.yml` 中添加 plugins volume：
            ```yaml
            services:
              cli-proxy-api:
                image: eceasy/cli-proxy-api:latest
                ports:
                  - "8317:8317"
                volumes:
                  - ./config.yaml:/CLIProxyAPI/config.yaml
                  - ./auths:/root/.cli-proxy-api
                  - ./logs:/CLIProxyAPI/logs
                  - ./plugins:/CLIProxyAPI/plugins    # ← 添加这一行
                restart: unless-stopped
            ```

            **3.** 在 `config.yaml` 中启用（同上方配置）→ **4.** `docker compose up -d`

            > Apple Silicon / ARM 服务器：下载 `respfilter_linux_arm64.tar.gz`。

            ### 平台下载指南

            | 文件 | 平台 | 如何选择 |
            |------|------|----------|
            | `respfilter_linux_amd64-v3.tar.gz` | Linux x86_64 (AVX2+) | 2015 年后的大多数服务器。**推荐。** |
            | `respfilter_linux_amd64.tar.gz` | Linux x86_64 (基础版) | 旧 CPU 或不支持 AVX2 的虚拟机 |
            | `respfilter_linux_arm64.tar.gz` | Linux ARM64 | 树莓派 4/5、AWS Graviton、ARM 服务器 |
            | `respfilter_darwin_arm64.tar.gz` | macOS Apple Silicon | M1/M2/M3/M4 Mac |
            | `respfilter_darwin_amd64.tar.gz` | macOS Intel | 2020 年前的 Intel Mac |
            | `respfilter_windows_amd64.zip` | Windows x86_64 | 大多数 Windows 电脑/服务器 |
            | `respfilter_windows_arm64.zip` | Windows ARM64 | Snapdragon X、Surface Pro X |

            > **不知道选哪个 Linux？** 下载 `amd64-v3`。如果你的 CPU 不支持 AVX2，CPA 会自动回退到 `amd64` 版本。

            ### 验证下载

            ```bash
            sha256sum -c checksums.txt                    # 校验完整性
            nm -D respfilter.so \| grep cliproxy          # 验证符号 (Linux/macOS)
            # 预期：cliproxyPluginCall, cliproxyPluginFree, cliproxyPluginShutdown, cliproxy_plugin_init
            ```

            ### 什么是 516 问题？

            当 OpenAI 对第三方客户端（CLIProxyAPI、OpenCode 等）的请求进行降智时：
            - `reasoning_tokens` 始终固定为 **516**，无论你请求的推理强度是 low/medium/high/xhigh
            - 模型回答质量明显下降，但 Token 费用仍按正常收取
            - 这是一个可检测的特征——本插件就是利用这个固定值来识别降智

            详见[社区讨论](https://github.com/router-for-me/CLIProxyAPI/discussions/3937)。

            ### 文档

            完整文档：[README.md](https://github.com/duncatzat/cpa-resp516-filter/blob/main/README.md) (English) · [README_CN.md](https://github.com/duncatzat/cpa-resp516-filter/blob/main/README_CN.md) (中文)
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: false
