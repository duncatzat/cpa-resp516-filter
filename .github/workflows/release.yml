name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Build matrix — 7 targets matching CLIProxyAPI's own release coverage
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.variant && '-' || '' }}${{ matrix.variant }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 v3 (AVX2+ — CPA's preferred scan path)
          - goos: linux
            goarch: amd64
            goamd64: v3
            runner: ubuntu-latest
            variant: v3
            artifact: respfilter.so
          # Linux amd64 baseline
          - goos: linux
            goarch: amd64
            goamd64: v1
            runner: ubuntu-latest
            variant: ""
            artifact: respfilter.so
          # Linux arm64 — native ARM runner
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            variant: ""
            artifact: respfilter.so
          # macOS Apple Silicon
          - goos: darwin
            goarch: arm64
            runner: macos-15
            variant: ""
            artifact: respfilter.so
          # macOS Intel
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            variant: ""
            artifact: respfilter.so
          # Windows amd64
          - goos: windows
            goarch: amd64
            runner: windows-latest
            variant: ""
            artifact: respfilter.dll
          # Windows arm64
          - goos: windows
            goarch: arm64
            runner: windows-11-arm
            variant: ""
            artifact: respfilter.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ── C compiler ────────────────────────────────────────────────────
      # ubuntu-latest / ubuntu-24.04-arm: gcc pre-installed
      # macOS: clang pre-installed via Xcode CLT
      # windows amd64: MSYS2 mingw-w64 gcc at C:\msys64\mingw64\bin
      # windows arm64: MSYS2 gcc is x86_64 cross-compiler (can't assemble arm64),
      #   so use LLVM clang instead (native arm64 support)
      - name: Setup C compiler (Windows amd64)
        if: runner.os == 'Windows' && matrix.goarch == 'amd64'
        shell: pwsh
        run: |
          $candidates = @("C:\msys64\mingw64\bin", "C:\msys64\ucrt64\bin", "C:\Program Files\mingw64\bin")
          foreach ($p in $candidates) {
            $gcc = Join-Path $p "gcc.exe"
            if (Test-Path $gcc) {
              Write-Host "Found gcc at: $gcc"
              echo "$p" >> $env:GITHUB_PATH
              & $gcc --version
              return
            }
          }
          Write-Host "gcc not found, installing via choco..."
          choco install -y mingw --no-progress
          $gccPath = (Get-ChildItem -Path "C:\Program Files\mingw64\bin","C:\msys64\mingw64\bin" -Filter "gcc.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          if ($gccPath) { echo "$gccPath" >> $env:GITHUB_PATH }

      - name: Setup C compiler (Windows arm64)
        if: runner.os == 'Windows' && matrix.goarch == 'arm64'
        shell: pwsh
        run: |
          # On windows-11-arm, MSYS2's gcc targets x86_64 (emulated), not arm64.
          # Use LLVM clang instead, which natively targets arm64 Windows.
          $candidates = @(
            "C:\msys64\clang64\bin",
            "C:\Program Files\LLVM\bin",
            "C:\Program Files (x86)\LLVM\bin"
          )
          foreach ($p in $candidates) {
            $clang = Join-Path $p "clang.exe"
            if (Test-Path $clang) {
              Write-Host "Found clang at: $clang"
              echo "$p" >> $env:GITHUB_PATH
              & $clang --version
              return
            }
          }
          # Fallback: check if MSYS2 has clang64 package
          Write-Host "clang not found in standard paths, trying MSYS2 pacman..."
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-clang-aarch64-clang 2>$null
          if (Test-Path "C:\msys64\clang64\bin\clang.exe") {
            echo "C:\msys64\clang64\bin" >> $env:GITHUB_PATH
            & "C:\msys64\clang64\bin\clang.exe" --version
          }

      - name: Verify C compiler and Go
        shell: bash
        run: |
          echo "=== C compiler ==="
          which gcc && gcc --version || which cc && cc --version
          echo "=== Go ==="
          go version

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build plugin
        shell: bash
        run: |
          set -e

          # Set CC based on platform
          if [ "$RUNNER_OS" = "Windows" ]; then
            if [ "${{ matrix.goarch }}" = "arm64" ]; then
              export CC="clang"
            else
              export CC="gcc"
            fi
          elif [ "$RUNNER_OS" = "macOS" ]; then
            export CC="clang"
          else
            export CC="gcc"
          fi

          # Determine output filename
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="respfilter.dll"
          else
            OUTPUT="respfilter.so"
          fi

          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }} (GOAMD64=${{ matrix.goamd64 }})..."
          CGO_ENABLED=1 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          GOAMD64=${{ matrix.goamd64 }} \
          go build -buildmode=c-shared -ldflags="-s -w" -o "$OUTPUT" .

          # Remove the generated C header (not needed at runtime)
          rm -f respfilter.h

          # Verify the output
          ls -la "$OUTPUT"
          echo "✓ Build successful: $OUTPUT"

      # ── Stage into plugin directory structure ─────────────────────────
      - name: Stage plugin files
        shell: bash
        run: |
          set -e

          # Determine the plugin subdirectory for this target
          if [ "${{ matrix.goos }}" = "linux" ]; then
            if [ -n "${{ matrix.variant }}" ]; then
              PLUG_DIR="plugins/linux/${{ matrix.goarch }}-${{ matrix.variant }}"
            else
              PLUG_DIR="plugins/linux/${{ matrix.goarch }}"
            fi
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            PLUG_DIR="plugins/darwin/${{ matrix.goarch }}"
          else
            PLUG_DIR="plugins/windows/${{ matrix.goarch }}"
          fi

          mkdir -p "staging/$PLUG_DIR"
          cp "${{ matrix.artifact }}" "staging/$PLUG_DIR/"
          cp config.snippet.yaml "staging/"

          # Set permissions (dlopen needs read+execute)
          if [ "${{ matrix.goos }}" != "windows" ]; then
            chmod 755 "staging/$PLUG_DIR/${{ matrix.artifact }}"
          fi

          echo "Staged to: $PLUG_DIR"
          find staging -type f | sort

      # ── Archive ───────────────────────────────────────────────────────
      - name: Create archive
        id: archive
        shell: bash
        run: |
          set -e

          # Determine archive name
          if [ -n "${{ matrix.variant }}" ]; then
            ARCHIVE_NAME="respfilter_${{ matrix.goos }}_${{ matrix.goarch }}-${{ matrix.variant }}"
          else
            ARCHIVE_NAME="respfilter_${{ matrix.goos }}_${{ matrix.goarch }}"
          fi

          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE_FILE="${ARCHIVE_NAME}.zip"
            (cd staging && 7z a -tzip "../${ARCHIVE_FILE}" .)
          else
            ARCHIVE_FILE="${ARCHIVE_NAME}.tar.gz"
            tar czf "${ARCHIVE_FILE}" -C staging .
          fi

          echo "archive_file=${ARCHIVE_FILE}" >> $GITHUB_OUTPUT
          ls -la "${ARCHIVE_FILE}"
          echo "✓ Archive created: ${ARCHIVE_FILE}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: respfilter-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.variant && '-' || '' }}${{ matrix.variant }}
          path: ${{ steps.archive.outputs.archive_file }}
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Release — collect all artifacts and publish to GitHub Releases
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: |
          echo "=== All release artifacts ==="
          find artifacts -type f | sort
          echo ""
          echo "=== File sizes ==="
          ls -lh artifacts/*

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt || true
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            # CPA RespFilter ${{ steps.tag.outputs.tag }}

            A [CLIProxyAPI](https://github.com/router-for-me/CLIProxyAPI) plugin that detects and filters OpenAI reasoning degradation (the **516 problem**).

            ## Install

            1. Download the archive matching your platform
            2. Extract into your CLIProxyAPI installation directory (merge with existing `plugins/` folder)
            3. Add the plugin config to `config.yaml` (see `config.snippet.yaml` in the archive)
            4. Restart CLIProxyAPI

            ## Platforms

            | File | Platform | Plugin path |
            |------|----------|-------------|
            | `respfilter_linux_amd64-v3.tar.gz` | Linux x86_64 (AVX2+) | `plugins/linux/amd64-v3/respfilter.so` |
            | `respfilter_linux_amd64.tar.gz` | Linux x86_64 (baseline) | `plugins/linux/amd64/respfilter.so` |
            | `respfilter_linux_arm64.tar.gz` | Linux ARM64 | `plugins/linux/arm64/respfilter.so` |
            | `respfilter_darwin_arm64.tar.gz` | macOS Apple Silicon | `plugins/darwin/arm64/respfilter.so` |
            | `respfilter_darwin_amd64.tar.gz` | macOS Intel | `plugins/darwin/amd64/respfilter.so` |
            | `respfilter_windows_amd64.zip` | Windows x86_64 | `plugins/windows/amd64/respfilter.dll` |
            | `respfilter_windows_arm64.zip` | Windows ARM64 | `plugins/windows/arm64/respfilter.dll` |

            ## Which Linux amd64 to download?

            - **`amd64-v3`** — for CPUs with AVX2/BMI/FMA (most servers since ~2015). This is CPA's preferred scan path.
            - **`amd64`** — baseline x86_64, for older CPUs or VMs without AVX2.

            If unsure, download `amd64-v3`. CPA automatically falls back to `amd64` if the v3 binary can't load.

            ## Verify

            ```bash
            # Check checksums
            sha256sum -c checksums.txt

            # Verify exported symbols (Linux/macOS)
            nm -D respfilter.so | grep cliproxy
            # Expected: cliproxyPluginCall, cliproxyPluginFree, cliproxyPluginShutdown, cliproxy_plugin_init
            ```

            ## Full documentation

            See [README.md](https://github.com/duncatzat/cpa-resp516-filter/blob/main/README.md) (English) or [README_CN.md](https://github.com/duncatzat/cpa-resp516-filter/blob/main/README_CN.md) (中文).
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: false
